# ---- Dev Profile ----
spring:
  jpa:
    show-sql: true

  # ---- DevTools — Hot Reload ----
  devtools:
    restart:
      enabled: true
      # Bu klasörler değişince uygulama otomatik restart edilir
      additional-paths: src/main/java
      # Static dosyalar (JS/CSS/HTML) restart gerektirmez, LiveReload ile anında güncellenir
      exclude: static/**,templates/**,public/**
    livereload:
      enabled: true   # tarayıcı eklentisiyle otomatik sayfa yenileme
      port: 35729

logging:
  level:
    com.goaltracker: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web.servlet: DEBUG  # controller hatalarını görmek için

