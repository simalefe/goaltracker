# =============================================
# GoalTracker Pro — Production Profile
# =============================================

spring:
  # ---- DataSource (PostgreSQL) ----
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/goaltracker}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:postgres}
    password: "samet127"

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ---- Thymeleaf — cache enabled ----
  thymeleaf:
    cache: true

  # ---- Static Resources — versioning ----
  web:
    resources:
      chain:
        strategy:
          content:
            enabled: true
            paths: /css/**, /js/**, /images/**
      cache:
        period: 604800


# ---- Server ----
server:
  port: ${SERVER_PORT:8080}
  error:
    whitelabel:
      enabled: false
    include-stacktrace: never
    include-message: never

# ---- Actuator — only health and info exposed ----
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
# Bu ayar, mail health check'ini tamamen devre dışı bırakır.
# Mail özelliği gerçekten kullanıma hazır olduğunda (ortam değişkenleri MAIL_HOST,
# MAIL_USERNAME, MAIL_PASSWORD doğru şekilde ayarlandığında) bu satırı true yaparak yeniden etkinleştirebilirsiniz.
# ---- Logging — production levels ----
logging:
  level:
    root: WARN
    com.goaltracker: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: WARN

# ---- JWT — MUST use env variable, no hardcoded secret ----
jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXP:900000}
  refresh-expiration: ${JWT_REFRESH_EXP:604800000}

