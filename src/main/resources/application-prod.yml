# =============================================
# GoalTracker Pro — Production Profile
# =============================================

spring:
  # ---- DataSource (H2 File-Based for production) ----
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/goaltracker;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: org.h2.Driver
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  # ---- H2 Console — DISABLED in production ----
  h2:
    console:
      enabled: false

  # ---- Thymeleaf — cache enabled ----
  thymeleaf:
    cache: true

  # ---- Static Resources — versioning ----
  web:
    resources:
      chain:
        strategy:
          content:
            enabled: true
            paths: /css/**, /js/**, /images/**
      cache:
        period: 604800

  # ---- Flyway ----
  flyway:
    enabled: true
    baseline-on-migrate: false

# ---- Server ----
server:
  port: ${SERVER_PORT:8080}
  error:
    whitelabel:
      enabled: false
    include-stacktrace: never
    include-message: never

# ---- Actuator — only health and info exposed ----
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ---- Logging — production levels ----
logging:
  level:
    root: WARN
    com.goaltracker: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
    org.flywaydb: INFO

# ---- JWT — MUST use env variable, no hardcoded secret ----
jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXP:900000}
  refresh-expiration: ${JWT_REFRESH_EXP:604800000}

