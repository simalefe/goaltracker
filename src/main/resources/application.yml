# =============================================
# GoalTracker Pro — Application Configuration
# =============================================

spring:
  application:
    name: goaltracker

  # ---- DataSource (PostgreSQL) ----
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/goaltracker
    username: postgres
    password: "samet1273"

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


  # ---- Thymeleaf ----
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  # ---- Mail (placeholder — Phase 1) ----
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ---- Server ----
server:
  port: 8080
  error:
    whitelabel:
      enabled: false

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

# ---- Logging ----
logging:
  level:
    root: INFO
    com.goaltracker: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# ---- JWT ----
jwt:
  secret: ${JWT_SECRET:mySecretKeyAtLeast256BitsLongForHS256AlgorithmGoalTracker2026}
  access-expiration: ${JWT_ACCESS_EXP:900000}
  refresh-expiration: ${JWT_REFRESH_EXP:604800000}

# ---- App ----
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

