<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Bildirimler — GoalTracker Pro</title>
</head>
<body>
<main layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2><i class="bi bi-bell me-2"></i>Bildirimler</h2>
            <p class="text-muted mb-0" th:if="${unreadCount > 0}">
                <span th:text="${unreadCount}">0</span> okunmamış bildirim
            </p>
        </div>
        <div class="d-flex gap-2">
            <form th:action="@{/notifications/read-all}" method="post" th:if="${unreadCount > 0}">
                <button type="submit" class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-check-all me-1"></i>Tümünü Okundu İşaretle
                </button>
            </form>
            <a th:href="@{/settings/notifications}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-gear me-1"></i>Ayarlar
            </a>
        </div>
    </div>

    <!-- Type Filter -->
    <div class="card mb-4">
        <div class="card-body py-2">
            <form th:action="@{/notifications}" method="get" class="d-flex align-items-center gap-3">
                <label for="typeFilter" class="form-label mb-0 fw-bold">Filtre:</label>
                <select id="typeFilter" name="type" class="form-select form-select-sm" style="max-width: 250px;"
                        onchange="this.form.submit()">
                    <option value="">Tümü</option>
                    <option th:each="t : ${notificationTypes}" th:value="${t}" th:text="${t.name()}"
                            th:selected="${currentType != null && currentType == t}">TYPE</option>
                </select>
            </form>
        </div>
    </div>

    <!-- Notifications List -->
    <div class="list-group" th:if="${notifications != null && !notifications.empty}">
        <div th:each="notification : ${notifications.content}"
             class="list-group-item list-group-item-action d-flex align-items-start gap-3"
             th:classappend="${!notification.read ? 'list-group-item-light border-start border-primary border-3' : ''}">
            <!-- Icon -->
            <div class="flex-shrink-0 mt-1">
                <i class="bi fs-4" th:class="'bi fs-4 ' + ${notification.iconClass} + ' ' + ${notification.colorClass}"></i>
            </div>
            <!-- Content -->
            <div class="flex-grow-1">
                <div class="d-flex justify-content-between align-items-start">
                    <h6 class="mb-1" th:classappend="${!notification.read ? 'fw-bold' : ''}"
                        th:text="${notification.title}">Bildirim Başlığı</h6>
                    <small class="text-muted text-nowrap ms-2" th:text="${notification.formattedTime}">01 Oca 2026 20:00</small>
                </div>
                <p class="mb-1 text-muted small" th:text="${notification.message}">Bildirim mesajı</p>
                <div class="d-flex gap-2 mt-1">
                    <span class="badge bg-secondary" th:text="${notification.type.name()}">TIP</span>
                    <form th:action="@{/notifications/{id}/read(id=${notification.id})}" method="post"
                          th:if="${!notification.read}" class="d-inline">
                        <button type="submit" class="btn btn-link btn-sm p-0 text-decoration-none">
                            <i class="bi bi-check2 me-1"></i>Okundu İşaretle
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${notifications == null || notifications.empty}" class="text-center py-5">
        <i class="bi bi-bell-slash fs-1 text-muted"></i>
        <p class="text-muted mt-2">Henüz bildiriminiz yok.</p>
    </div>

    <!-- Pagination -->
    <div class="mt-4" th:if="${notifications != null}">
        <div th:replace="~{fragments/pagination :: pagination(${notifications}, '/notifications')}"></div>
    </div>
</main>
</body>
</html>
