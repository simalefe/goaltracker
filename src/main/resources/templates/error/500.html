<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunucu Hatası — GoalTracker Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container text-center py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <i class="bi bi-gear text-danger" style="font-size: 6rem;"></i>
                <h1 class="display-1 fw-bold text-muted">500</h1>
                <h3 class="mb-3">Sunucu Hatası</h3>
                <p class="text-muted mb-4">Bir şeyler yanlış gitti. Lütfen daha sonra tekrar deneyin.</p>
                <a th:href="@{/dashboard}" class="btn btn-primary btn-lg me-2">
                    <i class="bi bi-house me-2"></i>Ana Sayfaya Dön
                </a>
                <button onclick="location.reload()" class="btn btn-outline-secondary btn-lg">
                    <i class="bi bi-arrow-clockwise me-2"></i>Yenile
                </button>
            </div>
        </div>
    </div>
</body>
</html>
