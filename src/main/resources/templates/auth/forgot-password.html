<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifremi Unuttum — GoalTracker Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; } .auth-card { max-width: 450px; margin: 100px auto; }</style>
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-key text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-2">Şifremi Unuttum</h2>
                <p class="text-muted">E-posta adresinizi girin, şifre sıfırlama bağlantısı göndereceğiz.</p>
            </div>
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <div th:if="${successMessage}" class="alert alert-success">
                        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    </div>
                    <div th:if="${errorMessage}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                    </div>
                    <form th:action="@{/auth/forgot-password}" th:object="${forgotForm}" method="post" novalidate>
                        <div class="mb-3">
                            <label for="email" class="form-label">E-posta</label>
                            <input type="email" th:field="*{email}" id="email" class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   placeholder="ornek@email.com">
                            <div class="invalid-feedback" th:errors="*{email}">E-posta hatası</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-envelope me-2"></i>Sıfırlama Bağlantısı Gönder
                        </button>
                    </form>
                </div>
            </div>
            <p class="text-center mt-3">
                <a th:href="@{/auth/login}" class="text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Giriş'e Dön</a>
            </p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
