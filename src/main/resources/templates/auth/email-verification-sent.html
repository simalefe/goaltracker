<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-posta Doğrulama Gönderildi — GoalTracker Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; } .auth-card { max-width: 500px; margin: 100px auto; }</style>
</head>
<body>
    <div class="container">
        <div class="auth-card text-center">
            <i class="bi bi-envelope-check text-success" style="font-size: 5rem;"></i>
            <h2 class="mt-3">E-posta Doğrulama Gönderildi</h2>
            <p class="text-muted mt-3">Kayıt işleminiz başarıyla tamamlandı! E-posta adresinize bir doğrulama bağlantısı gönderdik.</p>
            <p class="text-muted">Lütfen gelen kutunuzu kontrol edin ve bağlantıya tıklayarak e-posta adresinizi doğrulayın.</p>
            <div class="mt-4">
                <a th:href="@{/auth/login}" class="btn btn-primary"><i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap</a>
            </div>
        </div>
    </div>
</body>
</html>
