<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol — GoalTracker Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .auth-card { max-width: 500px; margin: 60px auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-bullseye text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-2">GoalTracker Pro</h2>
                <p class="text-muted">Yeni hesap oluşturun</p>
            </div>
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/auth/register}" th:object="${registerForm}" method="post" novalidate data-disable-on-submit>
                        <div class="mb-3">
                            <label for="email" class="form-label">E-posta *</label>
                            <input type="email" th:field="*{email}" id="email" class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   placeholder="ornek@email.com">
                            <div class="invalid-feedback" th:errors="*{email}">E-posta hatası</div>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">Kullanıcı Adı *</label>
                            <input type="text" th:field="*{username}" id="username" class="form-control"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   placeholder="kullanici_adi">
                            <div class="invalid-feedback" th:errors="*{username}">Kullanıcı adı hatası</div>
                            <div class="form-text">3-30 karakter, harf, rakam ve alt çizgi</div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Şifre *</label>
                            <input type="password" th:field="*{password}" id="password" class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   placeholder="••••••••">
                            <div class="invalid-feedback" th:errors="*{password}">Şifre hatası</div>
                            <div class="form-text">En az 8 karakter, 1 büyük harf, 1 küçük harf, 1 rakam</div>
                        </div>
                        <div class="mb-3">
                            <label for="displayName" class="form-label">Görünen Ad</label>
                            <input type="text" th:field="*{displayName}" id="displayName" class="form-control"
                                   placeholder="Ad Soyad">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-person-plus me-2"></i>Kayıt Ol
                        </button>
                    </form>
                </div>
            </div>
            <p class="text-center mt-3">
                Zaten hesabınız var mı? <a th:href="@{/auth/login}" class="text-decoration-none fw-bold">Giriş Yap</a>
            </p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
