<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-posta Doğrulama — GoalTracker Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; } .auth-card { max-width: 500px; margin: 100px auto; }</style>
</head>
<body>
    <div class="container">
        <div class="auth-card text-center">
            <div th:if="${successMessage}">
                <i class="bi bi-check-circle text-success" style="font-size: 5rem;"></i>
                <h2 class="mt-3">E-posta Doğrulandı</h2>
                <p class="text-muted mt-3" th:text="${successMessage}"></p>
            </div>
            <div th:if="${errorMessage}">
                <i class="bi bi-exclamation-circle text-danger" style="font-size: 5rem;"></i>
                <h2 class="mt-3">Doğrulama Başarısız</h2>
                <p class="text-muted mt-3" th:text="${errorMessage}"></p>
            </div>
            <div class="mt-4">
                <a th:href="@{/auth/login}" class="btn btn-primary"><i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap</a>
            </div>
        </div>
    </div>
</body>
</html>
