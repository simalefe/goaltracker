<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Sıfırla — GoalTracker Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; } .auth-card { max-width: 450px; margin: 100px auto; }</style>
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-2">Yeni Şifre Belirle</h2>
            </div>
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <div th:if="${errorMessage}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                    </div>
                    <form th:action="@{/auth/reset-password}" th:object="${resetForm}" method="post" novalidate>
                        <input type="hidden" th:field="*{token}">
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Yeni Şifre</label>
                            <input type="password" th:field="*{newPassword}" id="newPassword" class="form-control"
                                   th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
                                   placeholder="••••••••">
                            <div class="invalid-feedback" th:errors="*{newPassword}">Şifre hatası</div>
                            <div class="form-text">En az 8 karakter, 1 büyük harf, 1 küçük harf, 1 rakam</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-check-circle me-2"></i>Şifremi Sıfırla
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
