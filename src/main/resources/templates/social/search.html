<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Kullanıcı Ara — GoalTracker Pro</title>
</head>
<body>
<main layout:fragment="content">
    <div class="page-header">
        <h1 class="h2"><i class="bi bi-search me-2" style="color: var(--accent-cyan);"></i>Kullanıcı Ara</h1>
    </div>

    <!-- Search Form -->
    <div class="card mb-4 animate-fade-in stagger-1">
        <div class="card-body">
            <form th:action="@{/social/search}" method="get" class="d-flex gap-2 align-items-end">
                <div class="flex-grow-1">
                    <label for="searchQuery" class="form-label">Kullanıcı Adı</label>
                    <input type="text" class="form-control" id="searchQuery" name="query"
                           placeholder="Aramak istediğiniz kullanıcı adını girin..." required
                           aria-label="Kullanıcı ara">
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-search me-1"></i>Ara
                </button>
            </form>
        </div>
    </div>

    <!-- Search Results -->
    <div class="card animate-fade-in stagger-2" th:if="${searchResults != null}">
        <div class="card-header">
            <i class="bi bi-people me-2" style="color: var(--accent-indigo);"></i>Arama Sonuçları
        </div>
        <div th:if="${!searchResults.isEmpty()}">
            <div th:each="user : ${searchResults}" class="friend-item">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar-circle avatar-cyan" th:if="${user.avatarUrl() == null}">
                        <span th:text="${user.username().substring(0,1).toUpperCase()}">U</span>
                    </div>
                    <img th:if="${user.avatarUrl() != null}" th:src="${user.avatarUrl()}"
                         class="avatar-circle" style="object-fit: cover;" alt="Avatar">
                    <div>
                        <strong th:text="${user.displayName() != null ? user.displayName() : user.username()}"></strong>
                        <span style="color: var(--text-muted);" class="ms-1" th:text="'@' + ${user.username()}"></span>
                    </div>
                </div>
                <form th:action="@{/social/friends/request}" method="post">
                    <input type="hidden" name="receiverUsername" th:value="${user.username()}">
                    <button type="submit" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-person-plus me-1"></i>Arkadaş Ekle
                    </button>
                </form>
            </div>
        </div>
        <div class="card-body" th:if="${searchResults.isEmpty()}">
            <div class="empty-state">
                <i class="bi bi-search empty-icon"></i>
                <p>Kullanıcı bulunamadı.</p>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/social}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Sosyal Sayfasına Dön
        </a>
    </div>
</main>
</body>
</html>
