<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
    <div style="background-color: #198754; color: white; padding: 20px; text-align: center; border-radius: 8px 8px 0 0;">
        <h2 style="margin: 0;">✅ Hedef Tamamlandı!</h2>
    </div>
    <div style="padding: 20px; background-color: #f8f9fa; border-radius: 0 0 8px 8px;">
        <p style="font-size: 16px; color: #333;">Merhaba,</p>
        <p style="font-size: 16px; color: #333;">
            Tebrikler! <strong th:text="${goalTitle}">Hedef</strong> hedefinizi başarıyla tamamladınız.
        </p>
        <div style="text-align: center; margin: 20px 0;">
            <div style="display: inline-block; padding: 16px 32px; background-color: #d1e7dd; border-radius: 8px;">
                <span style="font-size: 48px;">🎉</span>
                <p style="color: #198754; font-weight: bold; margin: 8px 0 0 0;">Tamamlandı!</p>
            </div>
        </div>
        <div style="text-align: center; margin: 20px 0;">
            <a href="#" style="background-color: #198754; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; display: inline-block;">
                Hedeflerimi Görüntüle
            </a>
        </div>
        <hr style="border: none; border-top: 1px solid #dee2e6;">
        <p style="color: #888; font-size: 12px; text-align: center;">
            GoalTracker Pro
        </p>
    </div>
</body>
</html>
