# =============================================
# GoalTracker Pro — Test Profile Configuration
# =============================================

spring:
  application:
    name: goaltracker-test

  datasource:
    url: jdbc:tc:postgresql:16:///goaltrackertest
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


  thymeleaf:
    cache: false

  mail:
    host: localhost
    port: 25
    username: test
    password: test

  # Disable async for tests
  task:
    execution:
      pool:
        core-size: 1

# JWT — short expiration for test speed
jwt:
  secret: testSecretKeyAtLeast256BitsLongForHS256AlgorithmGoalTracker2026Test
  access-expiration: 900000
  refresh-expiration: 604800000

# App
app:
  base-url: http://localhost:8080

# Logging — minimal for tests
logging:
  level:
    root: WARN
    com.goaltracker: INFO
    org.springframework.web: WARN

